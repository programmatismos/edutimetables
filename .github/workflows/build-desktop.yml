name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build
        working-directory: packages/web

      - name: Copy web dist to desktop
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/web-dist
          Copy-Item -Recurse -Force packages/web/dist/* packages/desktop/web-dist/
        shell: powershell

      - name: Build Electron
        run: bun run build
        working-directory: packages/desktop

      - name: Package Windows .exe
        run: npx electron-builder --win --x64 --config electron-builder.yml
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: packages/desktop/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
