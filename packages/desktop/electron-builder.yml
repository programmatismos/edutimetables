appId: gr.edutimetables.app
productName: EduTimetables
copyright: Copyright © 2026

publish:
  provider: github
  owner: programmatismos
  repo: edutimetables
  releaseType: release

directories:
  output: dist
  buildResources: build

# Native .node binaries cannot be inside asar — unpack them
asarUnpack:
  - node_modules/libsql/**
  - node_modules/@libsql/**
  - "**/*.node"

# Files packed into the app asar
files:
  - dist-electron/**
  - web-dist/**
  - package.json
  # Native libsql binary (kept external from esbuild bundle)
  - node_modules/libsql/**
  - node_modules/@libsql/**
  - node_modules/detect-libc/**
  - node_modules/@neon-rs/**
  # electron-updater and its deps
  - node_modules/electron-updater/**
  - node_modules/builder-util-runtime/**
  - node_modules/semver/**

# Seed database — copied to userData on first launch
extraResources:
  - from: build/local.db
    to: local.db

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: EduTimetables-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: EduTimetables-${version}-${arch}.dmg
  category: public.app-category.education

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: EduTimetables-${version}-${arch}.${ext}
  category: Education
