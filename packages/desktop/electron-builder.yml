appId: gr.edutimetables.app
productName: EduTimetables
copyright: Copyright © 2026

publish:
  provider: github
  owner: programmatismos
  repo: edutimetables
  releaseType: release

directories:
  output: dist
  buildResources: build

# App icon
icon: build/icon

# better-sqlite3 contains a .node binary — must be unpacked from asar
asarUnpack:
  - node_modules/better-sqlite3/**
  - "**/*.node"

# Files packed into the app
files:
  - dist-electron/**
  - web-dist/**
  - package.json
  - node_modules/better-sqlite3/**
  # electron-updater and its deps
  - node_modules/electron-updater/**
  - node_modules/builder-util-runtime/**
  - node_modules/semver/**
  # drizzle-orm needed for better-sqlite3 adapter
  - node_modules/drizzle-orm/**

# Seed database — copied to userData on first launch
extraResources:
  - from: build/local.db
    to: local.db

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: EduTimetables-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: EduTimetables-${version}-${arch}.dmg
  category: public.app-category.education

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: EduTimetables-${version}-${arch}.${ext}
  category: Education
