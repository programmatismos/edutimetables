name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        env:
          DATABASE_URL: file:./local.db
        run: bun run build
        working-directory: packages/web

      - name: Push DB schema to seed local.db
        run: bunx drizzle-kit push --config drizzle.config.ts
        working-directory: packages/web
        env:
          DATABASE_URL: file:./local.db

      - name: Copy web dist to desktop
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/web-dist
          Copy-Item -Recurse -Force packages/web/dist/* packages/desktop/web-dist/
        shell: powershell

      - name: Prepare seed DB for extraResources
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/build
          if (Test-Path packages/web/local.db) {
            Copy-Item -Force packages/web/local.db packages/desktop/build/local.db
          } else {
            # Create empty placeholder so electron-builder doesn't fail
            [System.IO.File]::WriteAllBytes("packages/desktop/build/local.db", @())
          }
        shell: powershell

      - name: Install desktop package deps (for node_modules packing)
        run: bun install
        working-directory: packages/desktop

      - name: Build Electron main/preload (vite-plugin-electron)
        run: bun run build
        working-directory: packages/desktop

      - name: Bundle API server with esbuild
        # Bundles the Hono API into a single CJS file.
        # Only the native libsql binary is kept external (loaded from node_modules).
        run: bunx esbuild packages/desktop/electron/api-server.ts --bundle --platform=node --format=cjs --outfile=packages/desktop/dist-electron/api-server.cjs --external:libsql --external:electron --target=node18

      - name: Package Windows .exe
        run: npx electron-builder --win --x64 --config electron-builder.yml --publish never
        working-directory: packages/desktop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: packages/desktop/dist/*.exe
          generate_release_notes: true

      - name: Upload artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: EduTimetables-Windows
          path: packages/desktop/dist/*.exe
