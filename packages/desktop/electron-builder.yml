appId: gr.edutimetables.app
productName: EduTimetables
copyright: Copyright © 2026

# Point to your GitHub repo — change owner/repo
publish:
  provider: github
  owner: programmatismos
  repo: edutimetables
  releaseType: release   # only published (non-draft) releases trigger updates

# Auto-update feed is latest.yml (generated by electron-builder on publish)
# electron-updater reads this file from the GitHub release assets

directories:
  output: dist
  buildResources: build

files:
  - dist-electron/**
  - web-dist/**
  - package.json

win:
  target:
    - target: nsis        # standard Windows installer (.exe)
      arch: [x64]
  artifactName: EduTimetables-Setup-${version}.exe

nsis:
  oneClick: false         # show install wizard
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]  # Intel + Apple Silicon
  artifactName: EduTimetables-${version}-${arch}.dmg
  category: public.app-category.education

linux:
  target:
    - target: AppImage    # portable, no install needed
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: EduTimetables-${version}-${arch}.${ext}
  category: Education
