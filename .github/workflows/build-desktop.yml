name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build web app
        env:
          DATABASE_URL: file:./local.db
        run: bun run build
        working-directory: packages/web

      - name: Push DB schema to seed local.db
        run: bunx drizzle-kit push --config drizzle.config.ts
        working-directory: packages/web
        env:
          DATABASE_URL: file:./local.db

      - name: Seed local.db with default data
        run: node scripts/seed-local-db.mjs
        working-directory: packages/web

      - name: Copy web dist to desktop
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/web-dist
          Copy-Item -Recurse -Force packages/web/dist/* packages/desktop/web-dist/
        shell: powershell

      - name: Prepare seed DB for extraResources
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/build
          if (Test-Path packages/web/local.db) {
            Copy-Item -Force packages/web/local.db packages/desktop/build/local.db
          } else {
            [System.IO.File]::WriteAllBytes("packages/desktop/build/local.db", @())
          }
        shell: powershell

      - name: Install desktop package deps
        run: bun install
        working-directory: packages/desktop

      - name: Copy drizzle-orm to desktop node_modules
        # drizzle-orm lives in packages/web/node_modules (bun workspace).
        # electron-builder only packs packages/desktop/node_modules, so we copy it there.
        run: |
          New-Item -ItemType Directory -Force -Path packages/desktop/node_modules/drizzle-orm
          Copy-Item -Recurse -Force packages/web/node_modules/drizzle-orm/* packages/desktop/node_modules/drizzle-orm/
        shell: powershell

      - name: Bundle API server with esbuild
        # better-sqlite3, drizzle-orm and electron are kept external.
        # drizzle-orm is copied to desktop/node_modules so electron-builder packs it.
        run: bunx esbuild packages/desktop/electron/api-server.ts --bundle --platform=node --format=cjs --outfile=packages/desktop/dist-electron/api-server.cjs --external:better-sqlite3 --external:drizzle-orm --external:@libsql/client --external:electron --target=node18

      - name: Test bundle (smoke test before packaging)
        # Runs BEFORE electron-rebuild so better-sqlite3 is still compiled for Node 20
        # (matching the runner). After this step we rebuild for Electron ABI.
        env:
          DATABASE_SQLITE_PATH: packages/web/local.db
          ELECTRON_MODULES_PATH: packages/desktop/node_modules
        run: node packages/desktop/scripts/test-bundle.mjs

      - name: Rebuild better-sqlite3 for Electron
        # Compiles the native .node addon against the exact Electron headers.
        # Must happen AFTER the test step (which needs the Node 20 ABI binary).
        run: npx electron-rebuild -f -w better-sqlite3
        working-directory: packages/desktop

      - name: Build Electron main/preload (vite-plugin-electron)
        run: bun run build
        working-directory: packages/desktop

      - name: Package Windows .exe
        run: npx electron-builder --win --x64 --config electron-builder.yml --publish never
        working-directory: packages/desktop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/latest.yml
          generate_release_notes: true

      - name: Upload artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: EduTimetables-Windows
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/latest.yml
